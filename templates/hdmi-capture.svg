<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="shell" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8e8ea"/>
      <stop offset="0.5" stop-color="#bdbec1"/>
      <stop offset="1" stop-color="#7d7e82"/>
    </linearGradient>
    <linearGradient id="cable" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2a2c"/>
      <stop offset="1" stop-color="#0c0c0d"/>
    </linearGradient>
  </defs>

  <!-- cable boot behind plug -->
  <rect x="38" y="86" width="52" height="34" rx="6" fill="url(#cable)"/>
  <rect x="50" y="118" width="28" height="8" rx="3" fill="#1a1a1c"/>

  <!-- HDMI Type-A plug outline (trapezoid, wider on top) -->
  <path d="M 18 36 L 110 36 L 100 86 L 28 86 Z" fill="url(#shell)" stroke="#3a3a3c" stroke-width="2.5"/>

  <!-- inner cavity (dark) -->
  <path d="M 26 44 L 102 44 L 94 78 L 34 78 Z" fill="#161618" stroke="#2a2a2c" stroke-width="1"/>

  <!-- pin row (HDMI has 19 pins; we show 10 visually) -->
  <g fill="#d8d8da">
    <rect x="32" y="48" width="3" height="6"/>
    <rect x="39" y="48" width="3" height="6"/>
    <rect x="46" y="48" width="3" height="6"/>
    <rect x="53" y="48" width="3" height="6"/>
    <rect x="60" y="48" width="3" height="6"/>
    <rect x="67" y="48" width="3" height="6"/>
    <rect x="74" y="48" width="3" height="6"/>
    <rect x="81" y="48" width="3" height="6"/>
    <rect x="88" y="48" width="3" height="6"/>
    <rect x="95" y="48" width="3" height="6"/>
  </g>

  <!-- highlight on top edge -->
  <path d="M 22 38 L 106 38" stroke="#ffffff" stroke-width="1" opacity="0.5"/>

  <!-- HDMI label -->
  <text x="64" y="72" text-anchor="middle"
        font-family="DejaVu Sans, sans-serif" font-weight="bold"
        font-size="11" fill="#f4f4f5" letter-spacing="0.5">HDMI</text>

  <!-- small "in" arrow above plug, indicates input -->
  <path d="M 60 22 L 64 14 L 68 22 Z" fill="#3aa56a"/>
  <rect x="62" y="22" width="4" height="10" fill="#3aa56a"/>
</svg>
